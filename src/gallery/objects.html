---
layout: default
title: Objects
path: gallery
---

<div class="container mx-auto w-full max-w-2xl grid grid-cols-1 lg:grid-cols-1 gap-4 flex flex-col justify-center items-center px-4">
  <h1 class="mt-7  mb-10">
    <strong class="">
      {{title}}
    </strong>
  </h1>


<div id="gallery"></div>

<script type="text/javascript">

const data = [
  {
    title: "Extracted Memory I",
    year: 2024,
    measures: "15×12×10cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory I.jpg"]
  },
  {
    title: "Extracted Memory II",
    year: 2024,
    measures: "17×14×9cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory II.jpg"]
  },
  {
    title: "Extracted Memory III",
    year: 2024,
    measures: "40×15cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory III.jpg"]
  },
  {
    title: "Extracted Memory IV",
    year: 2025,
    measures: "30×15×10cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory IV.jpg"]
  },
  {
    title: "Extracted Memory V",
    year: 2025,
    measures: "22×17×10cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory V.jpg"]
  },
  {
    title: "Extracted Memory VI",
    year: 2026,
    measures: "23×15×12cm",
    materials: "Keramiplast, colored pencils",
    images: ["/static/objects/Extracted Memory VI.jpg"]
  }
];

let galleryHTML = '';

for (let item of data) {

  galleryHTML += `<div class="gallery-item space-y-1 mb-12 reveal">`;

  for (let img of item.images) {
    galleryHTML += `
      <img src="${img}" alt="Yulia Katan. ${item.title}" title="Yulia Katan. ${item.title}" loading="lazy" class="inset-0 mb-4 img-hover">`;
  }

  galleryHTML += `
      <h3 class="gallery-item gallery-item__title ml-10 mt-3 mb-1 mr-10 text-lg">${item.title}</h3>
      <p class="gallery-item__text ml-2 mr-2 sm:ml-10 sm:mr-10 mt-1">
        <span class="gallery-item__materials text-sm text-slate-700">${item.materials}</span><br>
        <span class="gallery-item__measures font-mono text-xs text-slate-700" style="letter-spacing: .1rem">${item.measures}</span><br>
        <span class="gallery-item__year text-xs font-mono tracking-wider text-slate-400 hover:text-slate-700" style="letter-spacing: .1rem">${item.year}</span>
      </p>
    </div>
  `;

}

const gallery = document.getElementById('gallery');
gallery.innerHTML = galleryHTML;

if (window.initReveal) window.initReveal();
</script>


</div>
